<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" width="100%" height="100%">
  <defs>
    <radialGradient id="skin" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8C4A8"/><stop offset="100%" stop-color="#B87B5A"/>
    </radialGradient>
    <radialGradient id="forge" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF5722" stop-opacity="0.6"/><stop offset="100%" stop-color="#FF5722" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="100%" height="100%" rx="16" fill="#141420"/>
  <ellipse cx="120" cy="262" rx="70" ry="10" fill="#000" opacity="0.3">
    <animate attributeName="rx" values="70;74;70" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Forge aura -->
  <circle cx="120" cy="148" r="70" fill="url(#forge)" opacity="0.15">
    <animate attributeName="r" values="70;82;70" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.08;0.15" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- BREATHING -->
  <g filter="url(#shadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-2;0,0" dur="3s" repeatCount="indefinite"/>

    <!-- Legs -->
    <rect x="88" y="195" width="24" height="45" rx="8" fill="#3E2723"/>
    <rect x="128" y="195" width="24" height="45" rx="8" fill="#3E2723"/>
    <rect x="84" y="232" width="32" height="12" rx="5" fill="#4E342E"/>
    <rect x="124" y="232" width="32" height="12" rx="5" fill="#4E342E"/>

    <!-- Belt with tools -->
    <rect x="84" y="190" width="72" height="8" rx="3" fill="#5D4037"/>
    <rect x="98" y="186" width="14" height="10" rx="2" fill="#795548"/>
    <rect x="128" y="186" width="14" height="10" rx="2" fill="#795548"/>

    <!-- Torso - Leather Apron -->
    <rect x="78" y="112" width="84" height="82" rx="14" fill="#5D4037"/>
    <rect x="88" y="118" width="64" height="70" rx="8" fill="#4E342E"/>
    <path d="M 90 120 L 150 185 M 150 120 L 90 185" stroke="#795548" stroke-width="2" opacity="0.5"/>
    <circle cx="110" cy="150" r="8" fill="#3E2723" opacity="0.6"/>

    <!-- Arms - muscular -->
    <rect x="57" y="120" width="24" height="50" rx="10" fill="#B87B5A"/>
    <rect x="159" y="120" width="24" height="50" rx="10" fill="#B87B5A"/>
    <rect x="53" y="155" width="32" height="20" rx="8" fill="#795548"/>
    <rect x="155" y="155" width="32" height="20" rx="8" fill="#795548"/>
    <rect x="55" y="152" width="28" height="4" rx="2" fill="#FF8F00" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="157" y="152" width="28" height="4" rx="2" fill="#FF8F00" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/>
    </rect>

    <!-- Head -->
    <circle cx="120" cy="78" r="46" fill="url(#skin)"/>
    <circle cx="100" cy="76" r="6" fill="#212121"/><circle cx="104" cy="74" r="2" fill="#FFF"/>
    <circle cx="140" cy="76" r="6" fill="#212121"/><circle cx="144" cy="74" r="2" fill="#FFF"/>
    <path d="M 105 88 Q 120 108 135 88" fill="none" stroke="#4E342E" stroke-width="2"/>
    <path d="M 76 55 Q 110 20 145 30 L 160 58 L 165 65 L 158 68 Q 148 50 130 40 L 105 35 Q 85 40 78 58 L 72 62 L 68 55 Q 70 50 76 55 Z" fill="#5D4037"/>
  </g>

  <!-- Forge Goggles -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-2;0,0" dur="3s" repeatCount="indefinite"/>
    <rect x="85" y="62" width="70" height="18" rx="6" fill="#424242"/>
    <rect x="90" y="65" width="22" height="12" rx="4" fill="#FF8F00" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="128" y="65" width="22" height="12" rx="4" fill="#FF8F00" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="116" y="63" width="8" height="14" rx="2" fill="#212121"/>
  </g>

  <!-- Flame Maul -->
  <g transform="translate(168,105) rotate(25)">
    <animateTransform attributeName="transform" type="translate" values="168,105;168,103;168,105" dur="1.8s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="rotate" values="25;28;25" dur="1.8s" repeatCount="indefinite" additive="sum"/>
    <rect x="-6" y="0" width="12" height="80" rx="4" fill="#4E342E"/>
    <rect x="-22" y="-16" width="44" height="22" rx="6" fill="#616161"/>
    <rect x="-20" y="-20" width="40" height="10" rx="4" fill="#FF5722" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1s" repeatCount="indefinite"/>
    </rect>
    <circle cx="0" cy="-10" r="5" fill="#FF9800" filter="url(#softglow)">
      <animate attributeName="r" values="5;8;5" dur="0.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- SPARKS -->
  <g>
    <circle cx="45" cy="140" r="2.5" fill="#FFC107" filter="url(#softglow)">
      <animate attributeName="cy" values="140;100;140" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="45;30;45" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="195" cy="100" r="2" fill="#FF9800" filter="url(#softglow)">
      <animate attributeName="cy" values="100;60;100" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="195;215;195" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="160" r="1.8" fill="#FF5722">
      <animate attributeName="cy" values="160;130;160" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="170" cy="180" r="2" fill="#FFC107">
      <animate attributeName="cy" values="180;150;180" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="55" cy="175" r="1.5" fill="#FFE082">
      <animate attributeName="cy" values="175;145;175" dur="0.65s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="0.65s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Lava cracks -->
  <path d="M 80 245 L 85 250 M 160 245 L 155 252" stroke="#FF5722" stroke-width="1.8" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.1;0.35" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <ellipse cx="120" cy="245" rx="55" ry="8" fill="#FF5722" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.04;0.1" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  <text x="120" y="275" font-family="sans-serif" font-size="16" font-weight="bold" fill="#E0E0E0" text-anchor="middle">Forgeborn</text>
</svg>