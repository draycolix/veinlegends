<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" width="100%" height="100%">
  <defs>
    <radialGradient id="skin" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#DEC4A8"/><stop offset="100%" stop-color="#A67C5A"/>
    </radialGradient>
    <radialGradient id="barrier" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00BCD4" stop-opacity="0.35"/><stop offset="100%" stop-color="#00BCD4" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="100%" height="100%" rx="16" fill="#141420"/>
  <ellipse cx="120" cy="262" rx="75" ry="12" fill="#000" opacity="0.4">
    <animate attributeName="rx" values="75;78;75" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- BARRIER AURA -->
  <circle cx="120" cy="148" r="80" fill="url(#barrier)" opacity="0.15">
    <animate attributeName="r" values="80;92;80" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="148" r="85" fill="none" stroke="#00BCD4" stroke-width="0.8" opacity="0.2">
    <animate attributeName="r" values="85;98;85" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.08;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- BREATHING -->
  <g filter="url(#shadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="4s" repeatCount="indefinite"/>

    <!-- Legs -->
    <rect x="85" y="195" width="26" height="45" rx="10" fill="#37474F"/>
    <rect x="129" y="195" width="26" height="45" rx="10" fill="#37474F"/>
    <rect x="81" y="232" width="34" height="14" rx="6" fill="#546E7A"/>
    <rect x="125" y="232" width="34" height="14" rx="6" fill="#546E7A"/>

    <!-- Belt -->
    <rect x="82" y="190" width="76" height="8" rx="3" fill="#455A64"/>
    <circle cx="120" cy="194" r="6" fill="#00BCD4" filter="url(#softglow)">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Torso -->
    <rect x="75" y="108" width="90" height="86" rx="16" fill="#455A64"/>
    <path d="M 120 114 L 120 192 M 84 140 L 156 140 M 84 170 L 156 170" stroke="#546E7A" stroke-width="1.5"/>
    <circle cx="120" cy="148" r="14" fill="none" stroke="#00BCD4" stroke-width="1.5" opacity="0.6"/>
    <circle cx="120" cy="148" r="6" fill="#00BCD4" opacity="0.5" filter="url(#softglow)">
      <animate attributeName="r" values="6;9;6" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Shoulder Pads -->
    <path d="M 48 110 L 68 100 L 80 120 L 68 135 L 48 130 Z" fill="#546E7A"/>
    <path d="M 192 110 L 172 100 L 160 120 L 172 135 L 192 130 Z" fill="#546E7A"/>

    <!-- Arms -->
    <rect x="55" y="120" width="22" height="50" rx="10" fill="#A67C5A"/>
    <rect x="163" y="120" width="22" height="50" rx="10" fill="#A67C5A"/>
    <rect x="50" y="152" width="32" height="22" rx="8" fill="#546E7A"/>
    <rect x="158" y="152" width="32" height="22" rx="8" fill="#546E7A"/>

    <!-- Head -->
    <circle cx="120" cy="78" r="48" fill="url(#skin)"/>
    <circle cx="98" cy="76" r="6" fill="#212121"/><circle cx="102" cy="74" r="2" fill="#FFF"/>
    <circle cx="142" cy="76" r="6" fill="#212121"/><circle cx="146" cy="74" r="2" fill="#FFF"/>
    <path d="M 106 93 L 134 93" stroke="#8D6E63" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M 74 55 Q 100 20 140 18 L 155 28 L 165 55 Q 168 65 162 70 L 155 58 Q 145 40 130 32 L 105 32 Q 90 40 80 58 L 75 62 L 70 55 Z" fill="#37474F"/>
  </g>

  <!-- Bastion Helm -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="4s" repeatCount="indefinite"/>
    <path d="M 70 55 Q 120 30 170 55 L 175 80 L 65 80 Z" fill="#546E7A"/>
    <rect x="62" y="72" width="116" height="12" rx="3" fill="#455A64"/>
    <rect x="110" y="35" width="20" height="5" rx="2" fill="#00BCD4" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Tower Shield -->
  <g transform="translate(168,120)">
    <animateTransform attributeName="transform" type="translate" values="168,120;168,118;168,120" dur="2.5s" repeatCount="indefinite" additive="sum"/>
    <rect x="-20" y="-30" width="40" height="70" rx="6" fill="#455A64"/>
    <rect x="-16" y="-26" width="32" height="62" rx="4" fill="#546E7A"/>
    <path d="M 0 -20 L 8 -5 L 0 10 L -8 -5 Z" fill="none" stroke="#00BCD4" stroke-width="1.8" opacity="0.7"/>
    <circle cx="0" cy="-5" r="4" fill="#00BCD4" opacity="0.5" filter="url(#softglow)">
      <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Stone fragments -->
  <g>
    <rect x="42" y="160" width="7" height="7" rx="1.5" fill="#78909C" opacity="0.6">
      <animate attributeName="y" values="160;130;160" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0 45 163;180 45 163;360 45 163" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="195" y="175" width="6" height="6" rx="1.5" fill="#78909C" opacity="0.5">
      <animate attributeName="y" values="175;145;175" dur="2.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0 197 177;120 197 177;0 197 177" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="75" y="195" width="5" height="5" rx="1" fill="#90A4AE" opacity="0.4">
      <animate attributeName="y" values="195;165;195" dur="2.8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <ellipse cx="120" cy="245" rx="65" ry="10" fill="#00BCD4" opacity="0.08">
    <animate attributeName="opacity" values="0.08;0.02;0.08" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <text x="120" y="275" font-family="sans-serif" font-size="16" font-weight="bold" fill="#E0E0E0" text-anchor="middle">Stonewarden</text>
</svg>