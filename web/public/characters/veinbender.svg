<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" width="100%" height="100%">
  <defs>
    <radialGradient id="skin" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0DDD0"/><stop offset="100%" stop-color="#C99276"/>
    </radialGradient>
    <radialGradient id="flux" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E676" stop-opacity="0.5"/><stop offset="100%" stop-color="#00E676" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="strongglow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="100%" height="100%" rx="16" fill="#141420"/>
  <ellipse cx="120" cy="262" rx="70" ry="10" fill="#000" opacity="0.3">
    <animate attributeName="rx" values="70;74;70" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- FLUX AURA -->
  <circle cx="120" cy="145" r="65" fill="url(#flux)" opacity="0.15">
    <animate attributeName="r" values="65;78;65" dur="2s" repeatCount="indefinite"/>
  </circle>
  <ellipse cx="120" cy="145" rx="55" ry="70" fill="none" stroke="#00E676" stroke-width="0.6" opacity="0.25" transform="rotate(-20 120 145)">
    <animateTransform attributeName="transform" type="rotate" from="-20 120 145" to="340 120 145" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="120" cy="145" rx="55" ry="70" fill="none" stroke="#00E5FF" stroke-width="0.5" opacity="0.18" transform="rotate(70 120 145)">
    <animateTransform attributeName="transform" type="rotate" from="70 120 145" to="430 120 145" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- BREATHING -->
  <g filter="url(#shadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-2;0,0" dur="3s" repeatCount="indefinite"/>

    <!-- Legs -->
    <rect x="90" y="195" width="22" height="45" rx="8" fill="#004D40"/>
    <rect x="128" y="195" width="22" height="45" rx="8" fill="#004D40"/>
    <rect x="86" y="232" width="28" height="12" rx="5" fill="#00695C"/>
    <rect x="126" y="232" width="28" height="12" rx="5" fill="#00695C"/>

    <!-- Belt with vials -->
    <rect x="86" y="190" width="68" height="7" rx="3" fill="#00897B"/>
    <rect x="98" y="183" width="8" height="12" rx="2" fill="#B2EBF2" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="115" y="183" width="8" height="12" rx="2" fill="#80CBC4" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.15;0.5" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="132" y="183" width="8" height="12" rx="2" fill="#B2EBF2" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.8s" repeatCount="indefinite"/>
    </rect>

    <!-- Torso -->
    <rect x="78" y="112" width="84" height="82" rx="14" fill="#00695C"/>
    <rect x="78" y="112" width="84" height="4" rx="2" fill="#00E676" opacity="0.4"/>
    <path d="M 120 116 L 120 185" stroke="#00897B" stroke-width="1.5"/>
    <path d="M 79 185 L 159 185" stroke="#00E676" stroke-width="0.6" opacity="0.25"/>
    <!-- Crystal brooch -->
    <path d="M 120 130 L 128 138 L 120 146 L 112 138 Z" fill="#00E5FF" opacity="0.7" filter="url(#softglow)">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.5s" repeatCount="indefinite"/>
    </path>

    <!-- Shoulder cape -->
    <path d="M 70 118 Q 50 150 55 185" fill="none" stroke="#004D40" stroke-width="12" opacity="0.6">
      <animate attributeName="d" values="M 70 118 Q 50 150 55 185;M 72 118 Q 52 152 57 185;M 70 118 Q 50 150 55 185" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M 170 118 Q 190 150 185 185" fill="none" stroke="#004D40" stroke-width="12" opacity="0.6">
      <animate attributeName="d" values="M 170 118 Q 190 150 185 185;M 168 118 Q 188 152 183 185;M 170 118 Q 190 150 185 185" dur="4s" repeatCount="indefinite"/>
    </path>

    <!-- Arms -->
    <rect x="62" y="122" width="18" height="50" rx="8" fill="#C99276"/>
    <rect x="160" y="122" width="18" height="50" rx="8" fill="#C99276"/>
    <rect x="59" y="155" width="24" height="18" rx="6" fill="#004D40"/>
    <rect x="157" y="155" width="24" height="18" rx="6" fill="#004D40"/>

    <!-- Head -->
    <circle cx="120" cy="78" r="45" fill="url(#skin)"/>
    <!-- Heterochromia -->
    <circle cx="98" cy="76" r="5.5" fill="#00E5FF" filter="url(#softglow)">
      <animate attributeName="r" values="5.5;4;5.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="142" cy="76" r="5.5" fill="#00E676" filter="url(#softglow)">
      <animate attributeName="r" values="5.5;4;5.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="99" cy="75" r="1.5" fill="#FFF"/><circle cx="143" cy="75" r="1.5" fill="#FFF"/>
    <path d="M 108 90 Q 120 98 132 90" fill="none" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Hair - platinum floating -->
    <path d="M 77 55 Q 100 10 140 5 Q 155 10 160 30 Q 168 55 165 68 L 160 60 Q 152 40 140 28 L 110 25 Q 95 35 82 58 L 75 65 L 70 55 Z" fill="#E0E0E0"/>
    <path d="M 100 15 Q 95 0 102 -12" fill="none" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round">
      <animate attributeName="d" values="M 100 15 Q 95 0 102 -12;M 100 15 Q 88 -2 98 -14;M 100 15 Q 95 0 102 -12" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 130 8 Q 135 -8 128 -20" fill="none" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round">
      <animate attributeName="d" values="M 130 8 Q 135 -8 128 -20;M 130 8 Q 142 -10 132 -22;M 130 8 Q 135 -8 128 -20" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Crystal Circlet -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-2;0,0" dur="3s" repeatCount="indefinite"/>
    <path d="M 76 56 Q 120 30 164 56 L 168 68 L 72 68 Z" fill="#00897B" opacity="0.6"/>
    <circle cx="120" cy="42" r="5" fill="#00E5FF" filter="url(#strongglow)">
      <animate attributeName="r" values="5;9;5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Flux Staff -->
  <g transform="translate(172,105) rotate(15)">
    <animateTransform attributeName="transform" type="translate" values="172,105;172,103;172,105" dur="2.5s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="rotate" values="15;17;15" dur="2.5s" repeatCount="indefinite" additive="sum"/>
    <rect x="-4" y="0" width="8" height="80" rx="3" fill="#004D40"/>
    <rect x="-5" y="20" width="10" height="6" rx="2" fill="#00897B"/>
    <rect x="-5" y="40" width="10" height="6" rx="2" fill="#00897B"/>
    <rect x="-5" y="60" width="10" height="6" rx="2" fill="#00897B"/>
    <!-- Crystal -->
    <path d="M -10 -15 L 10 -15 L 15 0 L 0 12 L -15 0 Z" fill="#00E5FF" opacity="0.7" filter="url(#strongglow)">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <circle cx="0" cy="-5" r="4" fill="#FFF" opacity="0.9">
      <animate attributeName="r" values="4;7;4" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <!-- Energy wisps -->
    <path d="M -12 -12 Q -22 -30 -10 -42" fill="none" stroke="#00E676" stroke-width="1.5" opacity="0.45">
      <animate attributeName="opacity" values="0.45;0.1;0.45" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 12 -12 Q 22 -28 12 -44" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="1.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ORBITING ORBS -->
  <g>
    <circle cx="50" cy="150" r="7" fill="none" stroke="#00E676" stroke-width="1.5" opacity="0.5">
      <animate attributeName="cy" values="150;118;150" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="r" values="7;5;7" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="150" r="2.5" fill="#00E5FF" filter="url(#softglow)">
      <animate attributeName="cy" values="150;118;150" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="190" cy="165" r="6" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.45">
      <animate attributeName="cy" values="165;135;165" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="6;4;6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="190" cy="165" r="2.2" fill="#00E676" filter="url(#softglow)">
      <animate attributeName="cy" values="165;135;165" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- SPARKLES -->
  <g>
    <circle cx="58" cy="182" r="2" fill="#FFF" opacity="0.6">
      <animate attributeName="cy" values="182;152;182" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="182" cy="142" r="1.8" fill="#FFF" opacity="0.5">
      <animate attributeName="cy" values="142;115;142" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="75" cy="165" r="1.5" fill="#B2EBF2" opacity="0.4">
      <animate attributeName="cy" values="165;138;165" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="165" cy="175" r="1.8" fill="#B2EBF2" opacity="0.35">
      <animate attributeName="cy" values="175;148;175" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <ellipse cx="120" cy="245" rx="55" ry="7" fill="#00E676" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.03;0.1" dur="1.8s" repeatCount="indefinite"/>
  </ellipse>
  <text x="120" y="275" font-family="sans-serif" font-size="16" font-weight="bold" fill="#E0E0E0" text-anchor="middle">Veinbender</text>
</svg>