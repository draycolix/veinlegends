<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" width="100%" height="100%">
  <defs>
    <radialGradient id="skin" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8D5C8"/><stop offset="100%" stop-color="#B8957A"/>
    </radialGradient>
    <radialGradient id="void" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C4DFF" stop-opacity="0.5"/><stop offset="100%" stop-color="#7C4DFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="100%" height="100%" rx="16" fill="#141420"/>
  <ellipse cx="120" cy="262" rx="65" ry="8" fill="#000" opacity="0.3"/>

  <!-- VOID AURA -->
  <circle cx="120" cy="150" r="60" fill="url(#void)" opacity="0.18">
    <animate attributeName="r" values="60;72;60" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.18;0.28;0.18" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- BREATHING -->
  <g filter="url(#shadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-1.5;0,0" dur="3.5s" repeatCount="indefinite"/>

    <!-- Legs -->
    <rect x="90" y="195" width="22" height="45" rx="8" fill="#1A1A2E"/>
    <rect x="128" y="195" width="22" height="45" rx="8" fill="#1A1A2E"/>
    <rect x="86" y="232" width="28" height="10" rx="4" fill="#12122A"/>
    <rect x="126" y="232" width="28" height="10" rx="4" fill="#12122A"/>

    <!-- Belt -->
    <rect x="86" y="190" width="68" height="6" rx="2" fill="#2A2A4A"/>

    <!-- Torso -->
    <rect x="80" y="112" width="80" height="82" rx="14" fill="#1A1A2E"/>
    <path d="M 92 118 L 110 190 M 150 118 L 135 190" stroke="#2A2A4A" stroke-width="2"/>
    <path d="M 80 118 L 160 118" stroke="#7C4DFF" stroke-width="0.8" opacity="0.3"/>
    <!-- Void crystal -->
    <path d="M 120 148 L 128 155 L 120 162 L 112 155 Z" fill="#7C4DFF" opacity="0.6" filter="url(#softglow)">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
    </path>

    <!-- Arms -->
    <rect x="61" y="122" width="20" height="48" rx="8" fill="#B8957A"/>
    <rect x="159" y="122" width="20" height="48" rx="8" fill="#B8957A"/>
    <rect x="58" y="150" width="26" height="22" rx="4" fill="#1A1A2E"/>
    <rect x="156" y="150" width="26" height="22" rx="4" fill="#1A1A2E"/>

    <!-- Head -->
    <circle cx="120" cy="78" r="46" fill="url(#skin)"/>
    <circle cx="100" cy="76" r="5.5" fill="#7C4DFF" filter="url(#softglow)">
      <animate attributeName="r" values="5.5;3.5;5.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="140" cy="76" r="5.5" fill="#7C4DFF" filter="url(#softglow)">
      <animate attributeName="r" values="5.5;3.5;5.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="101" cy="75" r="1.5" fill="#FFF"/>
    <circle cx="141" cy="75" r="1.5" fill="#FFF"/>
    <path d="M 112 90 L 128 90" stroke="#8D6E63" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Hair -->
    <path d="M 76 55 Q 100 15 140 10 L 155 18 L 165 40 Q 170 60 168 68 L 160 65 L 155 50 Q 145 30 130 25 L 105 25 Q 90 35 80 55 L 72 62 L 68 55 Z" fill="#12122A"/>
  </g>

  <!-- Shadow Hood -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-1.5;0,0" dur="3.5s" repeatCount="indefinite"/>
    <path d="M 72 55 Q 120 30 168 55 L 175 105 Q 120 112 65 105 Z" fill="#0D0D22"/>
    <path d="M 78 60 Q 120 42 162 60" stroke="#7C4DFF" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.15;0.4" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Dual Daggers -->
  <!-- Left -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="55,148;55,145;55,148" dur="2.8s" repeatCount="indefinite"/>
    <g transform="translate(55,148) rotate(-35)">
      <animateTransform attributeName="transform" type="rotate" values="-35;-32;-35" dur="2.8s" repeatCount="indefinite" additive="sum"/>
      <rect x="-3" y="0" width="6" height="35" rx="2" fill="#311B92"/>
      <rect x="-7" y="-8" width="14" height="10" rx="3" fill="#7C4DFF"/>
      <circle cx="0" cy="-3" r="3" fill="#B388FF" filter="url(#softglow)">
        <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
  <!-- Right -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="185,143;185,140;185,143" dur="2.5s" repeatCount="indefinite"/>
    <g transform="translate(185,143) rotate(-55)">
      <animateTransform attributeName="transform" type="rotate" values="-55;-52;-55" dur="2.5s" repeatCount="indefinite" additive="sum"/>
      <rect x="-3" y="0" width="6" height="38" rx="2" fill="#311B92"/>
      <rect x="-7" y="-10" width="14" height="12" rx="3" fill="#7C4DFF"/>
      <circle cx="0" cy="-4" r="3" fill="#B388FF" filter="url(#softglow)">
        <animate attributeName="r" values="3;5;3" dur="1.8s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- SHADOW TENDRILS -->
  <g opacity="0.35">
    <path d="M 50 200 Q 55 178 65 188 Q 75 168 85 183" fill="none" stroke="#7C4DFF" stroke-width="1.5">
      <animate attributeName="d" values="M 50 200 Q 55 178 65 188 Q 75 168 85 183;M 52 200 Q 60 172 72 185 Q 82 162 92 178;M 50 200 Q 55 178 65 188 Q 75 168 85 183" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 190 195 Q 185 173 175 183 Q 165 163 155 178" fill="none" stroke="#7C4DFF" stroke-width="1.5">
      <animate attributeName="d" values="M 190 195 Q 185 173 175 183 Q 165 163 155 178;M 188 195 Q 180 168 170 180 Q 160 158 150 173;M 190 195 Q 185 173 175 183 Q 165 163 155 178" dur="3.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- PARTICLES -->
  <g>
    <circle cx="48" cy="180" r="2.5" fill="#B388FF" filter="url(#softglow)">
      <animate attributeName="cy" values="180;145;180" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="190" cy="165" r="2" fill="#7C4DFF" filter="url(#softglow)">
      <animate attributeName="cy" values="165;130;165" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="85" cy="200" r="2" fill="#E040FB">
      <animate attributeName="cy" values="200;170;200" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="155" cy="190" r="1.8" fill="#7C4DFF" opacity="0.35">
      <animate attributeName="cy" values="190;155;190" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <ellipse cx="120" cy="245" rx="50" ry="7" fill="#7C4DFF" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.03;0.1" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <text x="120" y="275" font-family="sans-serif" font-size="16" font-weight="bold" fill="#E0E0E0" text-anchor="middle">Shadowvein</text>
</svg>