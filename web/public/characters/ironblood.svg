<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" width="100%" height="100%">
  <defs>
    <radialGradient id="skin" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0CFB0"/><stop offset="100%" stop-color="#C48A62"/>
    </radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter>
    <filter id="strongglow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="100%" height="100%" rx="16" fill="#141420"/>
  <ellipse cx="120" cy="262" rx="70" ry="10" fill="#000" opacity="0.35"/>

  <!-- BREATHING -->
  <g filter="url(#shadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-2;0,0" dur="2.5s" repeatCount="indefinite"/>

    <!-- Legs -->
    <rect x="88" y="195" width="24" height="45" rx="8" fill="#212121"/>
    <rect x="128" y="195" width="24" height="45" rx="8" fill="#212121"/>
    <rect x="84" y="232" width="32" height="12" rx="5" fill="#424242"/>
    <rect x="124" y="232" width="32" height="12" rx="5" fill="#424242"/>

    <!-- Belt -->
    <rect x="84" y="190" width="72" height="8" rx="3" fill="#B71C1C"/>
    <circle cx="120" cy="194" r="5" fill="#D32F2F">
      <animate attributeName="r" values="5;7;5" dur="1s" repeatCount="indefinite"/>
    </circle>

    <!-- Torso -->
    <rect x="78" y="112" width="84" height="82" rx="14" fill="#B71C1C"/>
    <path d="M 120 116 L 120 190 M 92 140 L 148 140 M 92 170 L 148 170" stroke="#8B0000" stroke-width="1.5"/>
    <!-- Scar -->
    <path d="M 105 125 L 115 135 L 110 145" stroke="#212121" stroke-width="1.5" fill="none"/>
    <!-- Pauldrons -->
    <path d="M 55 115 L 72 105 L 80 120 L 68 130 Z" fill="#424242"/>
    <path d="M 185 115 L 168 105 L 160 120 L 172 130 Z" fill="#424242"/>

    <!-- Arms -->
    <rect x="58" y="120" width="24" height="52" rx="10" fill="#C48A62"/>
    <rect x="158" y="120" width="24" height="52" rx="10" fill="#C48A62"/>
    <rect x="53" y="155" width="30" height="20" rx="7" fill="#424242"/>
    <rect x="157" y="155" width="30" height="20" rx="7" fill="#424242"/>

    <!-- Head -->
    <circle cx="120" cy="78" r="48" fill="url(#skin)"/>
    <circle cx="97" cy="76" r="6" fill="#212121"/><circle cx="101" cy="74" r="2" fill="#FFF"/>
    <circle cx="143" cy="76" r="6" fill="#212121"/><circle cx="147" cy="74" r="2" fill="#FFF"/>
    <path d="M 88 82 Q 120 100 152 82" fill="none" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 74 55 Q 100 15 145 10 L 160 20 Q 170 45 168 68 L 162 65 L 155 45 Q 145 30 128 22 L 105 22 Q 88 35 78 55 L 70 58 Z" fill="#C62828"/>
  </g>

  <!-- HEADBAND -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-2;0,0" dur="2.5s" repeatCount="indefinite"/>
    <path d="M 68 45 Q 120 25 172 45 L 175 58 Q 120 65 65 58 Z" fill="#B71C1C"/>
    <path d="M 55 48 Q 120 35 185 48" fill="none" stroke="#D32F2F" stroke-width="3"/>
  </g>

  <!-- WEAPON: Bloodedge Greatsword -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="170,115;170,112;170,115" dur="2s" repeatCount="indefinite"/>
    <g transform="translate(172,115) rotate(35)">
      <animateTransform attributeName="transform" type="rotate" values="35;38;35" dur="2s" repeatCount="indefinite" additive="sum"/>
      <rect x="-5" y="0" width="10" height="65" fill="#212121"/>
      <rect x="-14" y="-22" width="28" height="32" rx="4" fill="#D32F2F"/>
      <path d="M 0 -22 L 0 -40" stroke="#FFC107" stroke-width="2"/>
      <circle cx="0" cy="30" r="5" fill="#FF1744" filter="url(#strongglow)">
        <animate attributeName="r" values="5;8;5" dur="0.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.4;1" dur="0.6s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- BLOOD DRIP -->
  <circle cx="186" cy="88" r="2.5" fill="#FF1744" opacity="0.8">
    <animate attributeName="cy" values="88;145;88" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="186" cy="88" r="1.5" fill="#FF1744" opacity="0.6">
    <animate attributeName="cy" values="88;145;88" dur="1.2s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1.2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <!-- PARTICLES -->
  <g>
    <circle cx="42" cy="165" r="2" fill="#FF1744" filter="url(#strongglow)">
      <animate attributeName="cy" values="165;130;165" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="155" r="1.8" fill="#FFC107">
      <animate attributeName="cy" values="155;120;155" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="185" r="1.5" fill="#FFF" opacity="0.3">
      <animate attributeName="cy" values="185;155;185" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="148" cy="200" r="2" fill="#FF8A80" opacity="0.4">
      <animate attributeName="cy" values="200;175;200" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <ellipse cx="120" cy="245" rx="55" ry="7" fill="#FF1744" opacity="0.06">
    <animate attributeName="opacity" values="0.06;0.02;0.06" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  <text x="120" y="275" font-family="sans-serif" font-size="16" font-weight="bold" fill="#E0E0E0" text-anchor="middle">Ironblood</text>
</svg>