<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g1" x1="32" y1="4" x2="32" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="g2" x1="32" y1="4" x2="32" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- BG circle -->
  <circle cx="32" cy="32" r="31" fill="#0a0a0f" stroke="#1a1a2e" stroke-width="2"/>
  <!-- Crystal/Vein "V" shape -->
  <path d="M16 18 L32 54 L48 18" stroke="url(#g1)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <!-- Inner highlight -->
  <path d="M20 22 L32 50 L44 22" stroke="url(#g2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
  <!-- Center gem -->
  <circle cx="32" cy="36" r="4" fill="#fbbf24" filter="url(#glow)"/>
  <!-- Bottom accent dots -->
  <circle cx="22" cy="50" r="1.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="42" cy="50" r="1.5" fill="#fbbf24" opacity="0.5"/>
</svg>
